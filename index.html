<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Liam Jansson</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      width: 100%;
      text-align: center;
      background: #181818;
      padding: 50px 35px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .profile-image {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 25px;
      border: 4px solid #2b2b2b;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .role {
      color: #b0b0b0;
      font-size: 18px;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .about {
      font-size: 18px;
      line-height: 1.8;
      color: #d6d6d6;
      margin-bottom: 40px;
    }

    .instagram-link {
      display: inline-block;
      text-decoration: none;
      color: white;
      background: #262626;
      padding: 14px 28px;
      border-radius: 999px;
      transition: 0.3s ease;
      font-size: 16px;
    }

    .instagram-link:hover {
      background: #3a3a3a;
      transform: translateY(-2px);
    }
    .music-section {
  margin-top: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.vinyl-image {
  width: 220px;
  height: 220px;
  object-fit: cover;
  margin-bottom: 35px;

  transition: 0.3s ease;

  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
}

.vinyl-image:hover {
  transform: scale(1.03);
}

.playlist {

  width: 100%;
  max-width: 400px;
  height: 220px;

  overflow-y: auto;

  background: #1f1f1f;

  border-radius: 20px;

  padding: 15px;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.3);

}

.song {

  background: #2a2a2a;

  padding: 18px 20px;

  border-radius: 14px;

  margin-bottom: 12px;

  cursor: pointer;

  transition: 0.25s ease;

}

.song:hover {

  background: #3a3a3a;

  transform: translateY(-2px);

}

.song.active {

  background: white;
  color: black;

}

.spinning {
  animation: spin 3s linear infinite;
}

@keyframes spin {

  from {
    transform: rotate(0deg);
  }

  to {
    transform: rotate(360deg);
  }

}

  </style>
</head>

<body>

  <div class="container">

    <img 
      src="profile.jpg" 
      alt="Liam Jansson"
      class="profile-image"
    >

    <h1>Liam</h1>

    <p class="role">
      Videographer & Editor
    </p>

    <p class="about">
      I create cinematic videos, edits, and visual content with a clean
      and modern style. Passionate about storytelling, creativity,
      and building meaningful digital experiences through film and design.
    </p>

    <a 
      href="https://instagram.com/YOURUSERNAME"
      target="_blank"
      class="instagram-link"
    >
      Instagram
    </a>

  </div>
<div class="music-section">

  <img 
    src="vinyl.png"
    id="vinyl"
    class="vinyl-image"
    alt="Vinyl"
  />

  <div class="playlist">

    <div class="song" onclick="playSong('music/song1.mp3', this)">
      Song 1
    </div>

    <div class="song" onclick="playSong('music/song2.mp3', this)">
      Song 2
    </div>

    <div class="song" onclick="playSong('music/song3.mp3', this)">
      Song 3
    </div>

  </div>

</div>

<audio id="audio-player"></audio>
<script>

  const audioPlayer = document.getElementById("audio-player");
  const vinyl = document.getElementById("vinyl");

  function playSong(songPath, clickedSong) {

    const allSongs = document.querySelectorAll(".song");

    allSongs.forEach(song => {
      song.classList.remove("active");
    });

    clickedSong.classList.add("active");

    audioPlayer.src = songPath;

    audioPlayer.play();

    vinyl.classList.add("spinning");

  }

  audioPlayer.addEventListener("pause", () => {
    vinyl.classList.remove("spinning");
  });

</script>
</body>
</html>
