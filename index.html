<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Liam Jansson</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      width: 100%;
      text-align: center;
      background: #181818;
      padding: 50px 35px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .profile-image {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 25px;
      border: 4px solid #2b2b2b;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .role {
      color: #b0b0b0;
      font-size: 18px;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    .about {
      font-size: 18px;
      line-height: 1.8;
      color: #d6d6d6;
      margin-bottom: 40px;
    }

    .instagram-link {
      display: inline-block;
      text-decoration: none;
      color: white;
      background: #262626;
      padding: 14px 28px;
      border-radius: 999px;
      transition: 0.3s ease;
      font-size: 16px;
    }

    .instagram-link:hover {
      background: #3a3a3a;
      transform: translateY(-2px);
    }

  </style>
</head>

<body>

  <div class="container">

    <img 
      src="profile.jpg" 
      alt="Liam Jansson"
      class="profile-image"
    >

    <h1>Liam Jansson</h1>

    <p class="role">
      Videographer & Editor
    </p>

    <p class="about">
      I create cinematic videos, edits, and visual content with a clean
      and modern style. Passionate about storytelling, creativity,
      and building meaningful digital experiences through film and design.
    </p>

    <a 
      href="https://instagram.com/YOURUSERNAME"
      target="_blank"
      class="instagram-link"
    >
      Instagram
    </a>

  </div>

</body>
</html>
